# Override upstream to expose the "Encrypt system" checkbox and manual mode.

efi:
    mountPoint: "/boot"
    recommendedSize: 1GiB
    minimumSize: 32MiB
    label: "EFI"

userSwapChoices:
    - none
    - small
    - suspend

# luks1: GRUB in BIOS mode can't derive LUKS2 argon2id keys.
luksGeneration: luks1
enableLuksAutomatedPartitioning: true

allowManualPartitioning: true

showNotEncryptedBootMessage: false

partitionLayout:
    - name: "root"
      filesystem: "ext4"
      noEncrypt: false
      mountPoint: "/"
      size: 100%
