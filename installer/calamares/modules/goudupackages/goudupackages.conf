# Goudupackages module configuration.
# QmlViewStep reads `qmlSearch` and `qmlFilename` to locate the QML.
# We ship goudupackages.qml + Config.qml in the branding directory
# (see installer/calamares/default.nix), so BrandingOnly is the right
# search mode.
---
# Calamares' qmlSearchNames() enum maps to lowercase short names - "branding"
# (not "BrandingOnly") is the valid token here; upstream's unfree.conf uses
# the same value. The wrong value triggered a "Bad QML search mode" warning
# in the session log (Calamares fell back to a default and still found the
# file, but cleaner to spell it right).
qmlSearch:   branding
qmlFilename: goudupackages
